<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Meta ── -->
    <title>Atif Rameez — Full Stack Developer</title>
    <meta name="description" content="Full Stack Developer specializing in React, Node.js, and modern web technologies. Building scalable, performant, and beautiful digital experiences." />
    <meta name="keywords" content="Atif Rameez, Full Stack Developer, React Developer, Node.js, Web Developer, Portfolio, Pakistan" />
    <meta name="author" content="Atif Rameez" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (Social Sharing) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://atiframeez.dev/" />
    <meta property="og:title"       content="Atif Rameez — Full Stack Developer" />
    <meta property="og:description" content="Full Stack Developer specializing in React, Node.js, and modern web technologies." />
    <meta property="og:image"       content="/og-image.png" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Atif Rameez — Full Stack Developer" />
    <meta name="twitter:description" content="Full Stack Developer specializing in React, Node.js, and modern web technologies." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon"          href="/favicon.svg" />

    <!-- ── Google Fonts Preconnect ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Theme Color (mobile browser bar) ── -->
    <meta name="theme-color" content="#030712" />

    <!-- ── Inline script to prevent flash of wrong theme ── -->
    <script>
      document.documentElement.classList.add('dark')
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
